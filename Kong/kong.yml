# Kong Configuration for Sistema Clínico

_format_version: "3.0"

# ====================
# SERVICES
# ====================

services:
  - name: identity-service
    url: http://identity-service:8001
    routes:
      - name: identity-routes
        paths:
          - /api/identity
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: redis
          redis_host: redis
          redis_port: 6379
      - name: correlation-id
      - name: request-transformer
        config:
          add:
            headers:
              - X-Consumer-Name:test
      - name: response-transformer
        config:
          add:
            headers:
              - X-Kong-Upstream-Latency:$(latency.request)

  - name: scheduling-service
    url: http://scheduling-service:8002
    routes:
      - name: scheduling-routes
        paths:
          - /api/scheduling
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: redis
          redis_host: redis
          redis_port: 6379
      - name: correlation-id

  - name: medical-record-service
    url: http://medical-record-service:8003
    routes:
      - name: medical-record-routes
        paths:
          - /api/medical
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: redis
          redis_host: redis
          redis_port: 6379
      - name: correlation-id

  - name: billing-service
    url: http://billing-service:8004
    routes:
      - name: billing-routes
        paths:
          - /api/billing
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: redis
          redis_host: redis
          redis_port: 6379
      - name: correlation-id

  - name: reporting-service
    url: http://reporting-service:8005
    routes:
      - name: reporting-routes
        paths:
          - /api/reports
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: redis
          redis_host: redis
          redis_port: 6379
      - name: correlation-id

  - name: admin-panel
    url: http://admin-panel:8006
    routes:
      - name: admin-routes
        paths:
          - /api/admin
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: redis
          redis_host: redis
          redis_port: 6379
      - name: correlation-id

  - name: health-service
    url: http://identity-service:8001/health
    routes:
      - name: health-routes
        paths:
          - /health
        strip_path: false

# ====================
# PLUGINS (GLOBALES)
# ====================

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Request-ID
        - X-Correlation-ID
      exposed_headers:
        - X-Request-ID
        - X-Correlation-ID
      credentials: true
      max_age: 3600

  - name: request-logger
    config:
      logging_enabled: true
      log_bodies: true
      log_headers: true

  - name: prometheus
    config:
      per_consumer: false
